[build]
  base    = "understanding-ai"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# index.html — never cache so browsers always get the latest chunk manifest
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Vite-hashed assets — safe to cache forever (filename changes on every build)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
